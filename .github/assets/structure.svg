<svg xmlns="http://www.w3.org/2000/svg" width="775" height="542" viewBox="0 0 775 542" role="img" aria-label="File structure of the config">
  <rect x="1" y="1" width="773" height="540" rx="12" fill="#1a1b26" stroke="#2f334d" stroke-width="2"/>
  <circle cx="26" cy="26" r="6.5" fill="#f7768e"/>
  <circle cx="48" cy="26" r="6.5" fill="#e0af68"/>
  <circle cx="70" cy="26" r="6.5" fill="#9ece6a"/>
  <text x="387" y="31" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13" fill="#565f89">~/.config/nvim</text>
  <line x1="1" y1="48" x2="774" y2="48" stroke="#2f334d" stroke-width="1.5"/>
  <text x="30" y="78" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#565f89">.</tspan></text>
  <text x="30" y="101" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">├── </tspan><tspan fill="#bb9af7" font-weight="bold">init.lua</tspan><tspan fill="#565f89">                      # Entry point — loads everything below</tspan></text>
  <text x="30" y="124" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">├── </tspan><tspan fill="#e0af68">nvim-pack-lock.json</tspan><tspan fill="#565f89">           # Pinned plugin versions (reproducible installs)</tspan></text>
  <text x="30" y="147" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">├── </tspan><tspan fill="#7aa2f7" font-weight="bold">snippets/</tspan><tspan fill="#565f89">                     # Custom snippets, loaded by blink.cmp</tspan></text>
  <text x="30" y="170" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">└── </tspan><tspan fill="#7aa2f7" font-weight="bold">lua/</tspan></text>
  <text x="30" y="193" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">    ├── </tspan><tspan fill="#7aa2f7" font-weight="bold">config/</tspan></text>
  <text x="30" y="216" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">    │   ├── </tspan><tspan fill="#c0caf5">options.lua</tspan><tspan fill="#565f89">           # Editor options</tspan></text>
  <text x="30" y="239" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">    │   ├── </tspan><tspan fill="#c0caf5">keymaps.lua</tspan><tspan fill="#565f89">           # All keyboard shortcuts</tspan></text>
  <text x="30" y="262" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">    │   ├── </tspan><tspan fill="#c0caf5">autocmd.lua</tspan><tspan fill="#565f89">           # Automatic editor behavior</tspan></text>
  <text x="30" y="285" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">    │   └── </tspan><tspan fill="#c0caf5">commands.lua</tspan><tspan fill="#565f89">          # Custom user commands (:ConfigUpdate)</tspan></text>
  <text x="30" y="308" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">    └── </tspan><tspan fill="#7aa2f7" font-weight="bold">plugins/</tspan></text>
  <text x="30" y="331" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">        ├── </tspan><tspan fill="#bb9af7" font-weight="bold">init.lua</tspan><tspan fill="#565f89">              # Plugin list (vim.pack) — loads the modules below</tspan></text>
  <text x="30" y="354" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">        ├── </tspan><tspan fill="#c0caf5">completion.lua</tspan><tspan fill="#565f89">        # blink.cmp + lazydev source</tspan></text>
  <text x="30" y="377" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">        ├── </tspan><tspan fill="#c0caf5">treesitter.lua</tspan><tspan fill="#565f89">        # Treesitter parsers (tree-sitter-manager)</tspan></text>
  <text x="30" y="400" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">        ├── </tspan><tspan fill="#c0caf5">editing.lua</tspan><tspan fill="#565f89">           # conform, autopairs, mini.*, todo-comments, grug-far</tspan></text>
  <text x="30" y="423" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">        ├── </tspan><tspan fill="#c0caf5">git.lua</tspan><tspan fill="#565f89">               # gitsigns + hunk keymaps</tspan></text>
  <text x="30" y="446" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">        ├── </tspan><tspan fill="#c0caf5">telescope.lua</tspan><tspan fill="#565f89">         # Telescope + fzf + file browser</tspan></text>
  <text x="30" y="469" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">        ├── </tspan><tspan fill="#c0caf5">navigation.lua</tspan><tspan fill="#565f89">        # flash, harpoon, which-key</tspan></text>
  <text x="30" y="492" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">        ├── </tspan><tspan fill="#c0caf5">ui.lua</tspan><tspan fill="#565f89">                # tokyonight, lualine, nvim-notify, highlight-colors</tspan></text>
  <text x="30" y="515" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,Consolas,monospace" font-size="13.5"><tspan fill="#3b4261">        └── </tspan><tspan fill="#c0caf5">lsp.lua</tspan><tspan fill="#565f89">               # Mason + servers + formatters + lazydev (loaded last)</tspan></text>
</svg>
